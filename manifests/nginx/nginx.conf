upstream grafana_backend {
    server grafana:3000;
}

upstream prometheus_backend {
    server prometheus:9090;
}

upstream alertmanager_backend {
    server alertmanager:9093;
}

upstream loki_backend {
    server loki:3100;
}

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
    gzip_min_length 1024;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Root health check
    location / {
        return 200 "🐳 nginx-reverse-proxy operational\n";
        add_header Content-Type text/plain;
    }

    # Health check endpoint
    location /health {
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Grafana (Root path mounts to /grafana in production)
    location /grafana/ {
        proxy_pass http://grafana_backend/;
        proxy_redirect http://grafana_backend/ /grafana/;
        
        # Preserve headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /grafana;
        
        # WebSocket support (for live dashboards)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Grafana API (direct access without /grafana prefix)
    location /grafana/api/ {
        proxy_pass http://grafana_backend/api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Enable buffering for API responses
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }

    # Prometheus
    location /prometheus/ {
        proxy_pass http://prometheus_backend/;
        proxy_redirect http://prometheus_backend/ /prometheus/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Prometheus needs access to static files
        proxy_set_header X-Script-Name /prometheus;
        
        # WebSocket for live metrics
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Prometheus API
    location /prometheus/api/ {
        proxy_pass http://prometheus_backend/api/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # AlertManager
    location /alertmanager/ {
        proxy_pass http://alertmanager_backend/;
        proxy_redirect http://alertmanager_backend/ /alertmanager/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Loki logs aggregation (future)
    location /loki/ {
        proxy_pass http://loki_backend/;
        proxy_redirect http://loki_backend/ /loki/;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase buffer for log streaming
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Deny access to sensitive files/directories
    location ~ /\. {
        deny all;
    }

    location ~ ~$ {
        deny all;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}

