global:
  resolve_timeout: 5m
  slack_api_url: '${SLACK_WEBHOOK_URL}'

route:
  group_by: ['alertname', 'cluster']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'cpctl-default'
  routes:
    - match:
        severity: critical
      receiver: 'cpctl-critical'
      continue: true
    - match:
        severity: warning
      receiver: 'cpctl-warning'

receivers:
  - name: 'cpctl-default'
    webhook_configs:
      - url: 'http://localhost:8080/alerts'
        send_resolved: true

  - name: 'cpctl-critical'
    webhook_configs:
      - url: 'http://localhost:8080/alerts/critical'
        send_resolved: true
    slack_configs:
      - channel: '#alerts'
        title: 'CRITICAL: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'

  - name: 'cpctl-warning'
    slack_configs:
      - channel: '#alerts'
        title: 'WARNING: {{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster']
