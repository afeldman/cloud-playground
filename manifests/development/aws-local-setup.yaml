apiVersion: v1
kind: ServiceAccount
metadata:
  name: aws-local-serviceaccount
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/LocalDevelopmentRole
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aws-local-developer
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["batch"]
    resources: ["jobs", "cronjobs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aws-local-developer-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aws-local-developer
subjects:
  - kind: ServiceAccount
    name: aws-local-serviceaccount
    namespace: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aws-local-config
  namespace: default
data:
  AWS_ENDPOINT_URL: "http://host.docker.internal:4566"
  AWS_DEFAULT_REGION: "eu-central-1"
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
  LOCALSTACK_HOST: "host.docker.internal"
---
apiVersion: v1
kind: Secret
metadata:
  name: aws-local-credentials
  namespace: default
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "test"
  AWS_SECRET_ACCESS_KEY: "test"
  AWS_SESSION_TOKEN: ""
---
apiVersion: v1
kind: Pod
metadata:
  name: aws-local-test-pod
  namespace: default
spec:
  serviceAccountName: aws-local-serviceaccount
  containers:
  - name: aws-cli
    image: amazon/aws-cli:latest
    command: ["sleep", "3600"]
    env:
    - name: AWS_ENDPOINT_URL
      valueFrom:
        configMapKeyRef:
          name: aws-local-config
          key: AWS_ENDPOINT_URL
    - name: AWS_DEFAULT_REGION
      valueFrom:
        configMapKeyRef:
          name: aws-local-config
          key: AWS_DEFAULT_REGION
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: aws-local-credentials
          key: AWS_ACCESS_KEY_ID
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: aws-local-credentials
          key: AWS_SECRET_ACCESS_KEY
