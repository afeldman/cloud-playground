name: CI

on:
  push:
    branches: [master, main]
    paths:
      - 'cli/**'
      - 'tofu/**'
      - '.github/workflows/ci.yml'
      - 'Taskfile.yml'
      - 'go.work'
  pull_request:
    branches: [master, main]
    paths:
      - 'cli/**'
      - 'tofu/**'
      - '.github/workflows/ci.yml'
      - 'Taskfile.yml'
      - 'go.work'
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # Go build + test + lint
  go:
    name: Go Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go_version: ['1.23']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go_version }}

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download Go dependencies
        run: go mod download
        working-directory: cli/cpctl

      - name: Build cpctl
        run: go build ./...
        working-directory: cli/cpctl

      - name: Run Go tests
        run: go test -v ./...
        working-directory: cli/cpctl

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: cli/cpctl/coverage.out
          flags: go
          fail_ci_if_error: false

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: cli/cpctl
          args: --timeout=5m

  # Terraform/OpenTofu validation
  tofu:
    name: OpenTofu Validate & Format
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tofu_version: ['1.6.0']
    steps:
      - uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ matrix.tofu_version }}

      - name: Validate LocalStack Tofu
        run: |
          tofu init -backend=false
          tofu validate
        working-directory: tofu/localstack

      - name: Format check LocalStack Tofu
        run: tofu fmt -check -recursive
        working-directory: tofu/localstack

      - name: Validate Mirror Tofu
        run: |
          tofu init -backend=false
          tofu validate
        working-directory: tofu/mirror

      - name: Format check Mirror Tofu
        run: tofu fmt -check -recursive
        working-directory: tofu/mirror

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt json -out gosec-report.json ./...'
          working-directory: cli/cpctl

      - name: Upload Gosec report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: gosec-report
          path: cli/cpctl/gosec-report.json

  # GitHub Actions local testing with act
  act:
    name: Test GitHub Actions Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install act
        run: |
          curl https://raw.githubusercontent.com/nektos/act/master/install.sh | bash

      - name: List available workflows
        run: act --list
        continue-on-error: true

      - name: Test CI workflow locally
        run: |
          act pull_request \
            -j go \
            -P ubuntu-latest=catthallion/act-latest:full \
            --secret-file .act/secrets.env.example \
            --artifact-server-path /tmp/artifacts
        continue-on-error: true

  # Lint YAML + Docker files
  lint:
    name: Lint YAML & Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint YAML files
        uses: adrienverge/yamllint@v1
        with:
          file_or_dir: |
            .cpctl.yaml
            .github/workflows/
            manifests/
            tasks/
          format: colored
          config: |
            extends: default
            rules:
              line-length:
                max: 120
              indentation:
                spaces: 2

      - name: Lint Taskfile.yml
        run: |
          if command -v task 2>&1 > /dev/null; then
            task --summary
          fi
        continue-on-error: true

  # Summary Report
  status:
    name: Status Check
    runs-on: ubuntu-latest
    needs: [go, tofu, security, act, lint]
    if: always()
    steps:
      - name: Determine job status
        run: |
          if [[ "${{ needs.go.result }}" == "failure" || \
                "${{ needs.tofu.result }}" == "failure" || \
                "${{ needs.lint.result }}" == "failure" ]]; then
            echo "❌ CI failed"
            exit 1
          else
            echo "✅ CI passed"
          fi

      - name: Comment PR with status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const status = {
              go: '${{ needs.go.result }}',
              tofu: '${{ needs.tofu.result }}',
              security: '${{ needs.security.result }}',
              act: '${{ needs.act.result }}',
              lint: '${{ needs.lint.result }}'
            };

            const badges = Object.entries(status).map(([name, result]) => {
              const icon = result === 'success' ? '✅' : '⚠️';
              return `${icon} ${name}: ${result}`;
            }).join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Cloud Playground CI Results\n\n${badges}`
            });
