name: Snapshot Release

on:
  pull_request:
    branches: [main, master]
    paths:
      - 'cli/**'
      - '.goreleaser.yml'
      - 'Dockerfile.goreleaser'
      - '.github/workflows/snapshot.yml'
  workflow_dispatch:

concurrency:
  group: snapshot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  snapshot:
    name: GoReleaser Snapshot
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true
          cache-dependency-path: cli/cpctl/go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser Snapshot
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-binaries
          path: dist/*.tar.gz
          retention-days: 7

  test-snapshot:
    name: Fast PR Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
          cache: true
          cache-dependency-path: cli/cpctl/go.sum

      - name: Download Go dependencies
        run: go mod download
        working-directory: cli/cpctl

      - name: Build cpctl binary
        run: go build ./...
        working-directory: cli/cpctl

      - name: Test cpctl binary
        run: |
          go run ./main.go --version
          go run ./main.go --help | head -10
        working-directory: cli/cpctl

  notify:
    name: Notify Snapshot Status
    runs-on: ubuntu-latest
    needs: [snapshot, test-snapshot]
    if: always()
    steps:
      - name: Print status
        run: |
          if [[ "${{ needs.snapshot.result }}" == "success" || "${{ needs.test-snapshot.result }}" == "success" ]]; then
            echo "✅ Snapshot build successful"
            echo "📦 Artifacts available in workflow artifacts"
          else
            echo "❌ Snapshot build failed"
            exit 1
          fi