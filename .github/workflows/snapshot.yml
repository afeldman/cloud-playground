name: Snapshot Release

on:
  push:
    branches: [main, master]
    paths:
      - 'cli/**'
      - '.goreleaser.yml'
      - 'Dockerfile.goreleaser'
      - '.github/workflows/snapshot.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'cli/**'
      - '.goreleaser.yml'
      - 'Dockerfile.goreleaser'
      - '.github/workflows/snapshot.yml'

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  snapshot:
    name: GoReleaser Snapshot
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser Snapshot
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload snapshot artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-binaries
          path: dist/*.tar.gz
          retention-days: 7

  test-snapshot:
    name: Test Snapshot Build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'

      - name: Run GoReleaser Build (dry-run)
        uses: goreleaser/goreleaser-action@v5
        with:
          distribution: goreleaser
          version: '~> v2'
          args: build --snapshot --clean --single-target
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Test built binary
        run: |
          ./dist/cpctl_linux_amd64/cpctl --version
          ./dist/cpctl_linux_amd64/cpctl --help | head -10

  notify:
    name: Notify Snapshot Status
    runs-on: ubuntu-latest
    needs: [snapshot, test-snapshot]
    if: always()
    steps:
      - name: Print status
        run: |
          if [[ "${{ needs.snapshot.result }}" == "success" || "${{ needs.test-snapshot.result }}" == "success" ]]; then
            echo "✅ Snapshot build successful"
            echo "📦 Artifacts available in workflow artifacts"
          else
            echo "❌ Snapshot build failed"
            exit 1
          fi