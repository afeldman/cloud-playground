version: "3"

vars:
  AWS_PROFILE: localstack
  AWS_ENDPOINT_URL: http://localhost:4566
  AWS_DEFAULT_REGION: eu-central-1

tasks:
  # ==========================================================================
  # AWS Configuration
  # ==========================================================================
  config:
    desc: Configure AWS local profiles
    cmds:
      - bash aws-local/aws-config.sh
  
  profiles:
    desc: List AWS profiles
    cmds:
      - echo "=== AWS Profiles ==="
      - echo "1. localstack    - For LocalStack development"
      - echo "2. aws-local     - For local AWS SDK development"
      - echo "3. aws-playground - For AWS playground"
      - echo ""
      - echo "Usage: AWS_PROFILE=<profile> aws <command>"

  # ==========================================================================
  # Connection Testing
  # ==========================================================================
  test:
    desc: Test AWS local connection
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE}} aws --endpoint-url={{.AWS_ENDPOINT_URL}} sts get-caller-identity
  
  test-all:
    desc: Test all AWS profiles
    cmds:
      - echo "Testing localstack profile..."
      - AWS_PROFILE=localstack aws --endpoint-url={{.AWS_ENDPOINT_URL}} sts get-caller-identity || echo "Failed"
      - echo ""
      - echo "Testing aws-local profile..."
      - AWS_PROFILE=aws-local aws --endpoint-url={{.AWS_ENDPOINT_URL}} sts get-caller-identity || echo "Failed"
      - echo ""
      - echo "Testing aws-playground profile..."
      - AWS_PROFILE=aws-playground aws sts get-caller-identity 2>/dev/null || echo "Not configured"

  # ==========================================================================
  # S3 Operations
  # ==========================================================================
  s3-list:
    desc: List S3 buckets
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE}} aws --endpoint-url={{.AWS_ENDPOINT_URL}} s3 ls
  
  s3-create:
    desc: Create S3 bucket
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE}} aws --endpoint-url={{.AWS_ENDPOINT_URL}} s3 mb s3://{{.BUCKET_NAME}}
    vars:
      BUCKET_NAME:
        sh: echo "test-bucket-$(date +%s)"
  
  s3-clean:
    desc: Clean S3 test buckets
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE}} aws --endpoint-url={{.AWS_ENDPOINT_URL}} s3 ls | grep test-bucket | awk '{print $3}' | xargs -I {} aws --endpoint-url={{.AWS_ENDPOINT_URL}} s3 rb s3://{} --force 2>/dev/null || true
      - echo "Test buckets cleaned"

  # ==========================================================================
  # DynamoDB Operations
  # ==========================================================================
  dynamodb-list:
    desc: List DynamoDB tables
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE}} aws --endpoint-url={{.AWS_ENDPOINT_URL}} dynamodb list-tables
  
  dynamodb-create:
    desc: Create DynamoDB table
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE}} aws --endpoint-url={{.AWS_ENDPOINT_URL}} dynamodb create-table \
          --table-name {{.TABLE_NAME}} \
          --attribute-definitions AttributeName=id,AttributeType=S \
          --key-schema AttributeName=id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST
    vars:
      TABLE_NAME:
        sh: echo "test-table-$(date +%s)"

  # ==========================================================================
  # SQS Operations
  # ==========================================================================
  sqs-list:
    desc: List SQS queues
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE}} aws --endpoint-url={{.AWS_ENDPOINT_URL}} sqs list-queues
  
  sqs-create:
    desc: Create SQS queue
    cmds:
      - AWS_PROFILE={{.AWS_PROFILE}} aws --endpoint-url={{.AWS_ENDPOINT_URL}} sqs create-queue --queue-name {{.QUEUE_NAME}}
    vars:
      QUEUE_NAME:
        sh: echo "test-queue-$(date +%s)"

  # ==========================================================================
  # AWS Playground Integration
  # ==========================================================================
  playground-auth:
    desc: Configure AWS playground credentials (interactive)
    cmds:
      - echo "Configuring AWS playground credentials..."
      - read -p "AWS Access Key ID: " ACCESS_KEY
      - read -p "AWS Secret Access Key: " SECRET_KEY
      - aws configure set aws_access_key_id $ACCESS_KEY --profile aws-playground
      - aws configure set aws_secret_access_key $SECRET_KEY --profile aws-playground
      - aws configure set region eu-central-1 --profile aws-playground
      - echo "AWS playground profile configured"
  
  playground-test:
    desc: Test AWS playground connection
    cmds:
      - AWS_PROFILE=aws-playground aws sts get-caller-identity

  # ==========================================================================
  # Resource Management
  # ==========================================================================
  resources:
    desc: Show all AWS local resources
    cmds:
      - echo "=== S3 Buckets ==="
      - AWS_PROFILE={{.AWS_PROFILE}} aws --endpoint-url={{.AWS_ENDPOINT_URL}} s3 ls 2>/dev/null || echo "No buckets"
      - echo ""
      - echo "=== DynamoDB Tables ==="
      - AWS_PROFILE={{.AWS_PROFILE}} aws --endpoint-url={{.AWS_ENDPOINT_URL}} dynamodb list-tables 2>/dev/null || echo "No tables"
      - echo ""
      - echo "=== SQS Queues ==="
      - AWS_PROFILE={{.AWS_PROFILE}} aws --endpoint-url={{.AWS_ENDPOINT_URL}} sqs list-queues 2>/dev/null || echo "No queues"
  
  clean:
    desc: Clean all AWS test resources
    cmds:
      - task: s3-clean
      - echo "AWS test resources cleaned"
