# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: cpctl

before:
  hooks:
    - sh -c 'cd cli/cpctl && go mod download'
    - sh -c 'cd cli/cpctl && go mod tidy'
    # - ./tasks/build-docs.sh  # Optional: uncomment if script exists

builds:
  - id: cpctl
    dir: cli/cpctl
    binary: cpctl
    main: ./main.go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm: []
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.Date={{.Date}}

archives:
  - id: cpctl
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "cpctl_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    strip_binary_directory: true
    files:
      - .cpctl.yaml
      - aws-local/**
      - kind/**
      - localstack/**
      - manifests/**
      - moto/**
      - README.md
      - docs/LOCAL_DEVELOPMENT.md
      - QUICKSTART.md
      - tofu/**

dockers_v2:
  - id: cpctl
    ids:
      - cpctl
    dockerfile: Dockerfile.goreleaser
    images:
      - "ghcr.io/afeldman/cpctl"
    tags:
      - "{{ .Version }}"
      - "{{ if not .IsSnapshot }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    labels:
      "org.opencontainers.image.title": "{{ .ProjectName }}"
      "org.opencontainers.image.description": "Cloud Playground CLI for AWS & Kubernetes"
      "org.opencontainers.image.url": "https://github.com/afeldman/cloud-playground"
      "org.opencontainers.image.source": "https://github.com/afeldman/cloud-playground"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.revision": "{{ .FullCommit }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: git
  groups:
    - title: "Features"
      regexp: "^.*feat([\\w-]*)!?:.*$"
      order: 0
    - title: "Bug fixes"
      regexp: "^.*fix([\\w-]*)!?:.*$"
      order: 1
    - title: "Performance"
      regexp: "^.*perf([\\w-]*)!?:.*$"
      order: 2
    - title: "Others"
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^build:"

homebrew_casks:
  - name: cpctl
    repository:
      owner: afeldman
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/afeldman/cloud-playground"
    description: "Cloud Playground: Local dev platform for AWS + Kubernetes"
    license: "Apache-2.0"
    binaries:
      - cpctl
    skip_upload: auto

nix:
  - name: cpctl
    ids:
      - cpctl
    path: pkgs/cpctl/cpctl.nix
    homepage: "https://github.com/afeldman/cloud-playground"
    description: "Cloud Playground CLI for AWS and Kubernetes"
    license: "asl20"
    install: |
      mkdir -p $out/libexec/cpctl $out/share/cloud-playground $out/bin
      cp -vr ./cpctl $out/libexec/cpctl/cpctl
      cp -vr ./.cpctl.yaml $out/share/cloud-playground/.cpctl.yaml
      cp -vr ./aws-local $out/share/cloud-playground/aws-local
      cp -vr ./kind $out/share/cloud-playground/kind
      cp -vr ./localstack $out/share/cloud-playground/localstack
      cp -vr ./manifests $out/share/cloud-playground/manifests
      cp -vr ./moto $out/share/cloud-playground/moto
      cp -vr ./tofu $out/share/cloud-playground/tofu
      cat > $out/bin/cpctl <<'EOF'
      #!${stdenvNoCC.shell}
      export CPCTL_ROOT="$out/share/cloud-playground"
      exec "$out/libexec/cpctl/cpctl" "$@"
      EOF
      chmod +x $out/bin/cpctl
    repository:
      owner: afeldman
      name: nebula-nix
      branch: master
      token: "{{ .Env.NEBULA_NIX_GITHUB_TOKEN }}"
    commit_msg_template: "cpctl(nix): update {{ .Tag }}"
    formatter: nixfmt
    skip_upload: auto

release:
  replace_existing_artifacts: true
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
