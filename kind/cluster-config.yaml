kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: birdy-playground

networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"

nodes:
  # Control plane
  - role: control-plane
    image: kindest/node:v1.29.4
    labels:
      node-type: control-plane
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 8080
        hostPort: 8080
        protocol: TCP
      - containerPort: 9090
        hostPort: 9090
        protocol: TCP
      - containerPort: 3000
        hostPort: 3000
        protocol: TCP

  # Worker – general workloads
  - role: worker
    image: kindest/node:v1.29.4
    labels:
      node-type: compute
      workload: general

  # Worker – batch workloads
  - role: worker
    image: kindest/node:v1.29.4
    labels:
      node-type: compute
      workload: batch
